<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Interface</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.game-container {
    width: 800px;
    height: 500px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    padding: 20px;
    position: relative;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.score {
    font-size: 24px;
    font-weight: bold;
}

.health-container {
    width: 250px;
}

.health-text {
    margin-bottom: 5px;
}

.health-bar {
    width: 100%;
    height: 20px;
    background: #333;
    border-radius: 10px;
    overflow: hidden;
}

.health-fill {
    width: 100%;
    height: 100%;
    background: #22c55e;
    transition: 0.3s;
}

.game-area {
    margin-top: 30px;
    height: 320px;
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.player {
    width: 60px;
    height: 60px;
    background: #3b82f6;
    border-radius: 50%;
    box-shadow: 0 0 20px #3b82f6;
}

.controls {
    margin-top: 20px;
    text-align: center;
}

button {
    padding: 12px 24px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}
</style>
</head>
<body>

<div class="game-container">

    <div class="top-bar">
        <div class="score">Score: <span id="score">0</span></div>

        <div class="health-container">
            <div class="health-text">Health</div>
            <div class="health-bar">
                <div class="health-fill" id="health"></div>
            </div>
        </div>
    </div>

    <div class="game-area">
        <div class="player"></div>
    </div>

    <div class="controls">
        <button onclick="startGame()">Start Game</button>
    </div>

</div>

<script>
let score = 0;
let health = 100;
let gameRunning = false;

function startGame() {
    if (gameRunning) return;

    gameRunning = true;

    const interval = setInterval(() => {
        score += 10;
        health -= 2;

        document.getElementById("score").textContent = score;
        document.getElementById("health").style.width = health + "%";

        if (health <= 0) {
            clearInterval(interval);
            alert("Game Over! Final Score: " + score);
            gameRunning = false;
            score = 0;
            health = 100;
            document.getElementById("score").textContent = score;
            document.getElementById("health").style.width = "100%";
        }
    }, 500);
}
</script>

</body>
</html>
